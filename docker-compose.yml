services:
  core-mcp:
    build: ./core-mcp
    ports:
      - "8000:8000"
    depends_on:
      state-store:
        condition: service_healthy
      opa:
        condition: service_healthy
    environment:
      - CORE_MCP_OPA_URL=${CORE_MCP_OPA_URL}
      - CORE_MCP_DATABASE_URL=${CORE_MCP_DATABASE_URL}
      - CORE_MCP_LOG_LEVEL=${CORE_MCP_LOG_LEVEL}
      - CORE_MCP_HOST=${CORE_MCP_HOST}
      - CORE_MCP_PORT=${CORE_MCP_PORT}
      - CORE_MCP_TEMPLATES_DIR=/app/templates
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
    volumes:
      - ./templates:/app/templates:ro
      - terraform-data:/opt/cloud-seed-mcp/projects
      - gcloud-config:/root/.config/gcloud
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - seed-net

  opa:
    image: openpolicyagent/opa:latest
    command: run --server --addr :8181 /policies
    volumes:
      - ./policy-engine/policies:/policies:ro
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - seed-net

  tool-forge:
    build: ./tool-forge
    ports:
      - "8001:8001"
    depends_on:
      state-store:
        condition: service_healthy
    environment:
      - CORE_MCP_DATABASE_URL=${CORE_MCP_DATABASE_URL}
      - TOOL_FORGE_HOST=0.0.0.0
      - TOOL_FORGE_PORT=8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - seed-net

  state-store:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./state-store/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seed -d seeddb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - seed-net

volumes:
  pgdata:
  terraform-data:
  gcloud-config:

networks:
  seed-net:
    driver: bridge
